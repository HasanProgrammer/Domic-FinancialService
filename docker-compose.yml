name: 'financial_service'

services:
  
  domic.financial.api:
    networks:
      - domic
    image: financial_service_api_image:1.0.0
    container_name: "financial_service_api"
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "2500-2510:443"
    volumes:
      - log:/app/CoreLogs
      - ~\.aspnet\https\:/https/
    environment:
      - Elastic-Host=http://domic.elastic.search:9200
      - Elastic-Index=financial
      - Elastic-Username=domic
      - Elastic-Password=Domic123!@#
      - E-RabbitMQ-Host=domic.rabbit.mq
      - E-RabbitMQ-Port=5672
      - E-RabbitMQ-Username=domic
      - E-RabbitMQ-Password=Domic123!@#
      - I-RabbitMQ-Host=
      - I-RabbitMQ-Port=
      - I-RabbitMQ-Username=
      - I-RabbitMQ-Password=
      - E-RedisConnectionString=domic.redis:6379
      - I-RedisConnectionString=
      - MongoConnectionString=
      - C-SqlServerConnectionString=Server=domic.financial.command.sql.server,1433;Database=financialService;User ID=sa;Password=Domic123!@#;Persist Security Info=True;MultipleActiveResultSets=True;
      - Q-SqlServerConnectionString=
      - Host=domic.financial.api
      - Port=80
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Password=Domic123!@#
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/Domic.WebAPI.pfx
    
    depends_on:
      - domic.financial.command.sql.server
      - domic.financial.redis
  
  domic.financial.command.sql.server:
    networks:
      - domic
    image: 'mcr.microsoft.com/mssql/server'
    container_name: "financial_command_sql_server"
    ports:
      - 1433:1433
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Domic123!@#

  domic.financial.redis:
    networks:
      - domic
    image: 'redis'
    container_name: 'financial_redis'
    command: 'redis-server'
    ports:
      - 6380:6379

volumes:
  log:

networks:
  domic:
    external: true